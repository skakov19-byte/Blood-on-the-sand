<!DOCTYPE html>
<!--
  ANCIENT EGYPT CLICKER
  ======================================================================
  IMAGE REQUIREMENT: This game loads the clickable character from a LOCAL
  IMAGE FILE, not CSS/SVG/Canvas art. It expects the file to live right
  next to this HTML document on disk:

      D:\Game\Claude\photo1.png

  Since this file was generated inside D:\Game\Claude\ and photo1.png is
  already sitting there, the relative reference "./photo1.png" resolves
  to exactly that path when you open index.html straight from disk
  (file:// URL) - no server needed.

  As a bonus/fallback it will also try "./assets/character.png" (in case
  you'd rather organize assets that way later). If neither file can be
  found, a hand-drawn gold placeholder with a crown emoji is shown
  automatically so the game is always playable.
  ======================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>𓂀 Pharaoh's Ascension 𓂀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#D4A574;
    --gold-bright:#F0C97A;
    --blue:#1A2F4C;
    --blue-deep:#0D1826;
    --red:#8B1A1A;
    --orange:#E8A84C;
    --black:#1A1A1A;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden;
    font-family:'Cormorant Garamond', serif;
    background:var(--blue-deep);
    color:#f5e6c8;
    user-select:none;
  }

  /* ---------- BACKGROUND SCENE ---------- */
  #scene{
    position:fixed; inset:0;
    background:linear-gradient(180deg,
      #E8A84C 0%,
      #E4915A 18%,
      #B96A5C 34%,
      #6B4368 50%,
      #35335A 66%,
      #1A2F4C 82%,
      #0D1826 100%);
    overflow:hidden;
  }

  #sun{
    position:absolute; left:50%; top:22%; width:140px; height:140px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle, #FFE9B0 0%, #F0C97A 40%, rgba(240,201,122,0) 72%);
    border-radius:50%;
    box-shadow:0 0 90px 30px rgba(240,201,122,0.35);
    animation:sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse{ 0%,100%{opacity:.85} 50%{opacity:1} }

  .pyramid{
    position:absolute; bottom:18%;
    width:0; height:0;
    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-bottom:200px solid #4a3a2e;
    filter:brightness(0.55);
  }
  .pyramid::after{
    content:''; position:absolute; left:0; top:0;
    border-left:80px solid transparent;
    border-right:0 solid transparent;
    border-bottom:200px solid rgba(0,0,0,0.25);
  }
  .pyramid.p1{ left:6%; border-left-width:130px; border-right-width:130px; border-bottom-width:165px; }
  .pyramid.p2{ left:20%; border-left-width:200px; border-right-width:200px; border-bottom-width:250px; filter:brightness(0.45); }
  .pyramid.p3{ right:8%; border-left-width:150px; border-right-width:150px; border-bottom-width:190px; }
  .pyramid.p4{ right:24%; border-left-width:100px; border-right-width:100px; border-bottom-width:130px; filter:brightness(0.4); }

  #dunes{
    position:absolute; left:0; right:0; bottom:0; height:22%;
    background:
      radial-gradient(ellipse 60% 100% at 20% 100%, #C89355 0%, transparent 70%),
      radial-gradient(ellipse 50% 100% at 60% 100%, #B9834B 0%, transparent 70%),
      radial-gradient(ellipse 70% 100% at 90% 100%, #D4A574 0%, transparent 70%),
      linear-gradient(180deg, #a97b45, #6e5330);
  }

  .sand-particle{
    position:absolute; top:-10px;
    width:3px; height:3px; border-radius:50%;
    background:var(--gold-bright);
    opacity:0.6;
    pointer-events:none;
    animation-name:fall;
    animation-timing-function:linear;
    animation-iteration-count:infinite;
  }
  @keyframes fall{
    0%{ transform:translateY(-10px) translateX(0); opacity:0; }
    10%{ opacity:.7; }
    100%{ transform:translateY(105vh) translateX(30px); opacity:0; }
  }

  .deco-symbol{
    position:absolute;
    font-size:28px;
    color:rgba(212,165,116,0.25);
    pointer-events:none;
    user-select:none;
  }

  /* ---------- HIEROGLYPHIC BORDER ---------- */
  #border-frame{
    position:fixed; inset:8px;
    border:3px solid rgba(212,165,116,0.5);
    border-radius:14px;
    pointer-events:none;
    z-index:5;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.4);
  }
  #border-frame::before, #border-frame::after{
    content:'𓅓 𓆣 𓋹 𓂀 𓆓 𓊹 𓈖 𓅃 𓏏 𓆑 𓎡 𓂋 𓅱 𓊵 𓆖 𓇋 𓐍 𓁶 𓄿 𓎼';
    position:absolute;
    left:0; right:0;
    text-align:center;
    letter-spacing:14px;
    font-size:14px;
    color:rgba(212,165,116,0.45);
    white-space:nowrap;
    overflow:hidden;
  }
  #border-frame::before{ top:-2px; }
  #border-frame::after{ bottom:-2px; }

  /* ---------- HEADER / TOP UI ---------- */
  #top-ui{
    position:fixed; top:0; left:0; right:0;
    padding:22px 24px 10px;
    z-index:20;
    display:flex; flex-direction:column; align-items:center;
    gap:8px;
  }

  #level-display{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:clamp(20px,4vw,32px);
    color:var(--gold-bright);
    text-shadow:0 0 12px rgba(240,201,122,0.6), 0 2px 3px rgba(0,0,0,0.8);
    letter-spacing:2px;
    display:flex; align-items:center; gap:10px;
  }
  #level-display .ankh{ font-size:0.8em; color:var(--orange); }

  #xp-bar-wrap{
    width:min(560px, 92vw);
    height:26px;
    background:rgba(13,24,38,0.75);
    border:2px solid var(--gold);
    border-radius:14px;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 14px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.6);
  }
  #xp-bar-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--red), var(--orange), var(--gold-bright));
    background-size:200% 100%;
    transition:width .35s cubic-bezier(.4,1.4,.6,1);
    box-shadow:0 0 12px rgba(240,201,122,0.7);
    animation:barShimmer 3s linear infinite;
  }
  @keyframes barShimmer{ 0%{background-position:0% 0} 100%{background-position:200% 0} }

  #xp-bar-text{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel', serif;
    font-size:13px;
    font-weight:600;
    color:#fff8e6;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
    letter-spacing:1px;
  }

  #skillpoint-display{
    font-family:'Cinzel', serif;
    font-size:clamp(14px,2.6vw,17px);
    color:var(--gold);
    display:flex; align-items:center; gap:6px;
    text-shadow:0 1px 3px rgba(0,0,0,0.8);
  }
  #skillpoint-display .sp-icon{ filter:drop-shadow(0 0 4px rgba(240,201,122,0.7)); }

  /* ---------- CENTER CHARACTER ---------- */
  #char-stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:15;
    pointer-events:none;
  }

  #char-wrap{
    position:relative;
    width:min(46vw, 260px);
    height:min(46vw, 260px);
    pointer-events:auto;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  #aura{
    position:absolute; inset:-20%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(240,201,122,0.55) 0%, rgba(232,168,76,0.28) 35%, rgba(232,168,76,0) 70%);
    animation:auraPulse 2.6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes auraPulse{
    0%,100%{ transform:scale(0.94); opacity:0.75; }
    50%{ transform:scale(1.08); opacity:1; }
  }

  #char-ring{
    position:absolute; inset:-6%;
    border-radius:50%;
    border:3px solid var(--gold-bright);
    box-shadow:0 0 20px 4px rgba(240,201,122,0.55), inset 0 0 20px rgba(240,201,122,0.35);
    animation:ringSpin 18s linear infinite;
  }
  @keyframes ringSpin{ from{ transform:rotate(0deg);} to{ transform:rotate(360deg);} }
  #char-ring::before, #char-ring::after{
    content:'✦'; position:absolute; color:var(--gold-bright); font-size:14px;
    text-shadow:0 0 6px rgba(240,201,122,0.9);
  }
  #char-ring::before{ top:-8px; left:50%; transform:translateX(-50%); }
  #char-ring::after{ bottom:-8px; left:50%; transform:translateX(-50%); }

  #char-img, #char-fallback{
    width:100%; height:100%;
    border-radius:50%;
    object-fit:cover;
    border:4px solid var(--gold-bright);
    box-shadow:0 0 30px rgba(240,201,122,0.5), 0 8px 24px rgba(0,0,0,0.6);
    transition:transform .12s cubic-bezier(.4,1.6,.5,1);
    background:radial-gradient(circle at 35% 30%, #F0C97A, #E8A84C 55%, #8B1A1A 100%);
  }

  #char-fallback{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
  }
  #char-fallback .emoji{
    font-size:clamp(48px, 12vw, 84px);
    filter:drop-shadow(0 0 10px rgba(255,255,255,0.5));
  }
  #char-fallback .msg{
    font-family:'Cinzel', serif;
    font-size:11px;
    color:#3a2410;
    margin-top:6px;
    line-height:1.3;
    font-weight:600;
  }

  #char-wrap.clicked #char-img,
  #char-wrap.clicked #char-fallback{
    animation:squish .28s cubic-bezier(.4,1.8,.5,1);
  }
  @keyframes squish{
    0%{ transform:scale(1); }
    35%{ transform:scale(0.85); }
    65%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
  }

  /* floating +XP text */
  .float-xp{
    position:fixed;
    z-index:40;
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:20px;
    color:var(--gold-bright);
    text-shadow:0 0 8px rgba(240,201,122,0.9), 0 2px 2px rgba(0,0,0,0.8);
    pointer-events:none;
    animation:floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp{
    0%{ transform:translate(-50%,-50%) scale(0.8); opacity:1; }
    100%{ transform:translate(-50%,-180%) scale(1.15); opacity:0; }
  }

  /* ---------- PAGES / NAVIGATION ---------- */
  .page{ display:none; }
  .page.active{ display:block; }

  .page-title{
    position:fixed; top:26px; left:0; right:0;
    text-align:center;
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:clamp(22px,4.5vw,34px);
    color:var(--gold-bright);
    text-shadow:0 0 12px rgba(240,201,122,0.6), 0 2px 3px rgba(0,0,0,0.8);
    letter-spacing:2px;
    z-index:20;
    pointer-events:none;
  }

  #bottom-nav{
    position:fixed; left:0; right:0; bottom:0;
    z-index:30;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:6px;
    padding:10px 10px calc(10px + env(safe-area-inset-bottom, 0px));
    background:linear-gradient(0deg, rgba(13,24,38,0.95) 0%, rgba(13,24,38,0.85) 70%, rgba(13,24,38,0) 100%);
  }
  .nav-btn{
    font-family:'Cinzel', serif;
    font-size:clamp(9.5px, 1.6vw, 13px);
    line-height:1.25;
    font-weight:600;
    color:#f5e6c8;
    background:linear-gradient(180deg, #2a4568, #1A2F4C);
    border:1.5px solid var(--gold);
    border-radius:10px;
    padding:8px 4px;
    cursor:pointer;
    letter-spacing:.2px;
    text-align:center;
    transition:transform .15s ease, box-shadow .15s ease, background .2s ease, color .2s ease;
  }
  .nav-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 14px rgba(240,201,122,0.35);
  }
  .nav-btn:active{ transform:translateY(0) scale(0.97); }
  .nav-btn.active{
    background:linear-gradient(180deg, var(--gold-bright), var(--orange));
    color:#1A1A1A;
    box-shadow:0 0 14px rgba(240,201,122,0.7);
    border-color:var(--gold-bright);
  }

  /* ---------- STATS PANEL ---------- */
  #stats-panel{
    position:fixed;
    left:16px; bottom:88px;
    z-index:20;
    background:rgba(13,24,38,0.72);
    border:2px solid var(--gold);
    border-radius:12px;
    padding:12px 16px;
    font-family:'Cormorant Garamond', serif;
    font-size:15px;
    line-height:1.7;
    color:#f5e6c8;
    box-shadow:0 4px 18px rgba(0,0,0,0.5);
    max-width:210px;
  }
  #stats-panel h3{
    margin:0 0 6px;
    font-family:'Cinzel', serif;
    font-size:14px;
    color:var(--gold-bright);
    letter-spacing:1px;
    border-bottom:1px solid rgba(212,165,116,0.4);
    padding-bottom:4px;
  }
  #stats-panel .stat-row{ display:flex; justify-content:space-between; gap:14px; }
  #stats-panel .stat-row span:last-child{ color:var(--gold-bright); font-weight:600; }

  /* ---------- UPGRADES PANEL ---------- */
  #upgrades-panel{
    position:fixed;
    right:16px; bottom:88px;
    z-index:20;
    background:rgba(13,24,38,0.72);
    border:2px solid var(--gold);
    border-radius:12px;
    padding:12px 14px;
    width:min(240px, 42vw);
    box-shadow:0 4px 18px rgba(0,0,0,0.5);
  }
  #upgrades-panel h3{
    margin:0 0 8px;
    font-family:'Cinzel', serif;
    font-size:14px;
    color:var(--gold-bright);
    letter-spacing:1px;
    border-bottom:1px solid rgba(212,165,116,0.4);
    padding-bottom:4px;
  }
  .upgrade-btn{
    width:100%;
    display:flex; flex-direction:column;
    background:linear-gradient(180deg, #2a4568, #1A2F4C);
    border:1.5px solid var(--gold);
    border-radius:8px;
    padding:7px 10px;
    margin-bottom:8px;
    color:#f5e6c8;
    font-family:'Cormorant Garamond', serif;
    cursor:pointer;
    text-align:left;
    transition:transform .12s ease, box-shadow .12s ease, background .2s ease;
  }
  .upgrade-btn:last-child{ margin-bottom:0; }
  .upgrade-btn:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 4px 14px rgba(240,201,122,0.35);
    background:linear-gradient(180deg, #365580, #223a5c);
  }
  .upgrade-btn:active:not(:disabled){ transform:translateY(0px) scale(0.98); }
  .upgrade-btn:disabled{
    opacity:0.45;
    cursor:not-allowed;
  }
  .upgrade-btn .u-title{
    font-family:'Cinzel', serif;
    font-size:13px;
    font-weight:600;
    color:var(--gold-bright);
    display:flex; justify-content:space-between;
  }
  .upgrade-btn .u-desc{ font-size:12.5px; opacity:0.85; margin-top:2px; }
  .upgrade-btn .u-cost{ font-size:12px; color:var(--orange); margin-top:3px; font-weight:600; }

  /* ---------- LEVEL UP CELEBRATION ---------- */
  #levelup-banner{
    position:fixed; top:38%; left:50%;
    transform:translate(-50%,-50%) scale(0.4);
    z-index:60;
    font-family:'Cinzel', serif;
    font-weight:900;
    font-size:clamp(28px,6vw,52px);
    color:var(--gold-bright);
    text-shadow:0 0 20px rgba(240,201,122,1), 0 4px 8px rgba(0,0,0,0.9);
    opacity:0;
    pointer-events:none;
    letter-spacing:3px;
    text-align:center;
  }
  #levelup-banner.show{
    animation:levelUpPop 1.6s cubic-bezier(.2,1.6,.4,1) forwards;
  }
  @keyframes levelUpPop{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(0.3) rotate(-6deg); }
    18%{ opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(2deg); }
    30%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); }
    80%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-60%) scale(1.05); }
  }

  .sparkle{
    position:fixed;
    z-index:55;
    font-size:22px;
    pointer-events:none;
    color:var(--gold-bright);
    text-shadow:0 0 8px rgba(240,201,122,0.9);
    animation:sparkleFly 1.1s ease-out forwards;
  }
  @keyframes sparkleFly{
    0%{ transform:translate(0,0) scale(0.5) rotate(0deg); opacity:1; }
    100%{ transform:var(--fly) scale(1.3) rotate(180deg); opacity:0; }
  }

  #flash-overlay{
    position:fixed; inset:0;
    background:rgba(240,201,122,0.55);
    z-index:50;
    opacity:0;
    pointer-events:none;
  }
  #flash-overlay.flash{ animation:flashFx .5s ease-out forwards; }
  @keyframes flashFx{
    0%{ opacity:0.85; }
    100%{ opacity:0; }
  }

  .shake{ animation:screenShake .5s cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes screenShake{
    10%,90%{ transform:translate3d(-2px,0,0); }
    20%,80%{ transform:translate3d(4px,0,0); }
    30%,50%,70%{ transform:translate3d(-8px,0,0); }
    40%,60%{ transform:translate3d(8px,0,0); }
  }

  @media (max-width:640px){
    #stats-panel{ font-size:13px; padding:10px 12px; max-width:150px; bottom:118px; }
    #upgrades-panel{ width:150px; padding:10px; bottom:118px; }
    .upgrade-btn .u-desc{ display:none; }
  }
</style>
</head>
<body>

<div id="scene">
  <div id="sun"></div>
  <div class="pyramid p4"></div>
  <div class="pyramid p2"></div>
  <div class="pyramid p1"></div>
  <div class="pyramid p3"></div>
  <div id="dunes"></div>
  <div id="sand-container"></div>
  <div id="deco-container"></div>
</div>

<div id="border-frame"></div>
<div id="flash-overlay"></div>

<div class="page active" id="page-clicker">
  <div id="top-ui">
    <div id="level-display"><span class="ankh">☥</span> <span id="level-text">Level 1</span> <span class="ankh">☥</span></div>
    <div id="xp-bar-wrap">
      <div id="xp-bar-fill"></div>
      <div id="xp-bar-text"><span id="xp-text">0 / 100 XP</span></div>
    </div>
    <div id="skillpoint-display"><span class="sp-icon">𓋹</span> Skill Points: <span id="sp-count">0</span></div>
  </div>

  <div id="char-stage">
    <div id="char-wrap">
      <div id="aura"></div>
      <div id="char-ring"></div>
      <!--
        Primary image source: ./photo1.png  (i.e. D:\Game\Claude\photo1.png)
        Fallback image source: ./assets/character.png
        If both fail to load, #char-fallback (gold circle + emoji) is shown.
      -->
      <img id="char-img" src="./photo1.png" alt="Pharaoh" draggable="false">
      <div id="char-fallback">
        <div class="emoji">👑</div>
        <div class="msg">Place character.png in ./assets/<br>or photo1.png next to this file</div>
      </div>
    </div>
  </div>

  <div id="stats-panel">
    <h3>𓋴 Stats 𓋴</h3>
    <div class="stat-row"><span>Total Clicks</span><span id="stat-clicks">0</span></div>
    <div class="stat-row"><span>Level</span><span id="stat-level">1</span></div>
    <div class="stat-row"><span>XP Progress</span><span id="stat-xp">0 / 100</span></div>
    <div class="stat-row"><span>Skill Points Earned</span><span id="stat-sp">0</span></div>
    <div class="stat-row"><span>Click Power</span><span id="stat-power">1</span></div>
  </div>

  <div id="upgrades-panel">
    <h3>𓊪 Upgrades 𓊪</h3>
    <button class="upgrade-btn" id="upg-power">
      <span class="u-title"><span>Click Power</span><span id="power-lvl">Lv.0</span></span>
      <span class="u-desc">+1 XP per click</span>
      <span class="u-cost">Cost: <span id="power-cost">2</span> SP</span>
    </button>
    <button class="upgrade-btn" id="upg-auto">
      <span class="u-title"><span>Auto-Clicker</span><span id="auto-lvl">Lv.0</span></span>
      <span class="u-desc">+1 XP / second</span>
      <span class="u-cost">Cost: <span id="auto-cost">3</span> SP</span>
    </button>
    <button class="upgrade-btn" id="upg-speed">
      <span class="u-title"><span>Speed Boost</span><span id="speed-lvl">Lv.0</span></span>
      <span class="u-desc">-5% XP needed</span>
      <span class="u-cost">Cost: <span id="speed-cost">1</span> SP</span>
    </button>
  </div>
</div>

<div class="page" id="page-skills">
  <div class="page-title">𓋹 Дерево навыков 𓋹</div>
</div>

<div class="page" id="page-story">
  <div class="page-title">𓋹 Сюжетная кампания 𓋹</div>
</div>

<div class="page" id="page-daily">
  <div class="page-title">𓋹 Ежедневные задачи 𓋹</div>
</div>

<div class="page" id="page-achievements">
  <div class="page-title">𓋹 Достижения 𓋹</div>
</div>

<div id="levelup-banner">LEVEL UP!</div>

<nav id="bottom-nav">
  <button class="nav-btn active" data-page="clicker">Прокачка персонажа</button>
  <button class="nav-btn" data-page="skills">Дерево навыков</button>
  <button class="nav-btn" data-page="story">Сюжетная кампания</button>
  <button class="nav-btn" data-page="daily">Ежедневные задачи</button>
  <button class="nav-btn" data-page="achievements">Достижения</button>
</nav>

<script>
(function(){
  'use strict';

  /* ============ STATE ============ */
  const SAVE_KEY = 'egyptClickerSave_v1';

  let state = {
    level: 1,
    xp: 0,
    skillPoints: 0,
    totalSkillPointsEarned: 0,
    totalClicks: 0,
    clickPower: 1,
    powerLvl: 0,
    autoLvl: 0,
    speedLvl: 0
  };

  function xpNeeded(level){
    const base = 100 + (level - 1) * 10;
    const reduction = 1 - (state.speedLvl * 0.05);
    return Math.max(20, Math.round(base * Math.max(0.4, reduction)));
  }

  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        Object.assign(state, parsed);
      }
    }catch(e){ /* ignore corrupted save */ }
  }

  let saveTimer = null;
  function save(){
    if(saveTimer) return;
    saveTimer = setTimeout(()=>{
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
      saveTimer = null;
    }, 250);
  }

  /* ============ DOM REFS ============ */
  const el = {
    levelText: document.getElementById('level-text'),
    xpFill: document.getElementById('xp-bar-fill'),
    xpText: document.getElementById('xp-text'),
    spCount: document.getElementById('sp-count'),
    charWrap: document.getElementById('char-wrap'),
    charImg: document.getElementById('char-img'),
    charFallback: document.getElementById('char-fallback'),
    statClicks: document.getElementById('stat-clicks'),
    statLevel: document.getElementById('stat-level'),
    statXp: document.getElementById('stat-xp'),
    statSp: document.getElementById('stat-sp'),
    statPower: document.getElementById('stat-power'),
    levelupBanner: document.getElementById('levelup-banner'),
    flashOverlay: document.getElementById('flash-overlay'),
    sandContainer: document.getElementById('sand-container'),
    decoContainer: document.getElementById('deco-container'),
    upgPower: document.getElementById('upg-power'),
    upgAuto: document.getElementById('upg-auto'),
    upgSpeed: document.getElementById('upg-speed'),
    powerLvl: document.getElementById('power-lvl'),
    autoLvl: document.getElementById('auto-lvl'),
    speedLvl: document.getElementById('speed-lvl'),
    powerCost: document.getElementById('power-cost'),
    autoCost: document.getElementById('auto-cost'),
    speedCost: document.getElementById('speed-cost'),
  };

  /* ============ IMAGE FALLBACK HANDLING ============ */
  // Try primary path (./photo1.png). If it fails, try ./assets/character.png.
  // If that also fails, show the drawn placeholder.
  let triedAssets = false;
  el.charImg.addEventListener('error', function(){
    if(!triedAssets){
      triedAssets = true;
      el.charImg.src = './assets/character.png';
      return;
    }
    el.charImg.style.display = 'none';
    el.charFallback.style.display = 'flex';
  });

  /* ============ RENDER ============ */
  function render(){
    el.levelText.textContent = 'Level ' + state.level;
    const needed = xpNeeded(state.level);
    const pct = Math.min(100, (state.xp / needed) * 100);
    el.xpFill.style.width = pct + '%';
    el.xpText.textContent = Math.floor(state.xp) + ' / ' + needed + ' XP';
    el.spCount.textContent = state.skillPoints;

    el.statClicks.textContent = state.totalClicks;
    el.statLevel.textContent = state.level;
    el.statXp.textContent = Math.floor(state.xp) + ' / ' + needed;
    el.statSp.textContent = state.totalSkillPointsEarned;
    el.statPower.textContent = state.clickPower;

    el.powerLvl.textContent = 'Lv.' + state.powerLvl;
    el.autoLvl.textContent = 'Lv.' + state.autoLvl;
    el.speedLvl.textContent = 'Lv.' + state.speedLvl;

    const powerCost = 2 + state.powerLvl * 2;
    const autoCost = 3 + state.autoLvl * 3;
    const speedCost = 1 + state.speedLvl * 1;
    el.powerCost.textContent = powerCost;
    el.autoCost.textContent = autoCost;
    el.speedCost.textContent = speedCost;

    el.upgPower.disabled = state.skillPoints < powerCost;
    el.upgAuto.disabled = state.skillPoints < autoCost;
    el.upgSpeed.disabled = state.skillPoints < speedCost || xpNeeded(state.level) <= 20;
  }

  /* ============ FLOATING XP TEXT ============ */
  function spawnFloatXp(x, y, amount){
    const t = document.createElement('div');
    t.className = 'float-xp';
    t.textContent = '+' + amount + ' XP';
    t.style.left = x + 'px';
    t.style.top = y + 'px';
    document.body.appendChild(t);
    setTimeout(()=> t.remove(), 950);
  }

  /* ============ LEVEL UP CELEBRATION ============ */
  function celebrateLevelUp(){
    el.levelupBanner.textContent = '𓋹 LEVEL ' + state.level + '! 𓋹';
    el.levelupBanner.classList.remove('show');
    void el.levelupBanner.offsetWidth; // restart animation
    el.levelupBanner.classList.add('show');

    el.flashOverlay.classList.remove('flash');
    void el.flashOverlay.offsetWidth;
    el.flashOverlay.classList.add('flash');

    document.body.classList.remove('shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');

    const symbols = ['✦','☥','𓋹','𓂀','✧','𓆣'];
    const rect = el.charWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    for(let i=0;i<18;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 90 + Math.random()*160;
      const fx = Math.cos(angle)*dist;
      const fy = Math.sin(angle)*dist - 40;
      s.style.setProperty('--fly', `translate(${fx}px, ${fy}px)`);
      s.style.left = (cx + (Math.random()*40-20)) + 'px';
      s.style.top = (cy + (Math.random()*40-20)) + 'px';
      document.body.appendChild(s);
      setTimeout(()=> s.remove(), 1150);
    }
  }

  /* ============ AURA GROWTH WITH LEVEL ============ */
  function updateAura(){
    const growth = Math.min(1.6, 1 + state.level * 0.02);
    document.getElementById('aura').style.transform = `scale(${growth})`;
  }

  /* ============ CORE CLICK LOGIC ============ */
  function addXp(amount, clientX, clientY){
    state.xp += amount;
    state.totalClicks += 1;

    spawnFloatXp(clientX, clientY, amount);

    let needed = xpNeeded(state.level);
    let leveledUp = false;
    while(state.xp >= needed){
      state.xp -= needed;
      state.level += 1;
      state.skillPoints += 1;
      state.totalSkillPointsEarned += 1;
      leveledUp = true;
      needed = xpNeeded(state.level);
    }

    if(leveledUp){
      celebrateLevelUp();
      updateAura();
    }

    render();
    save();
  }

  function handleCharInteraction(clientX, clientY){
    el.charWrap.classList.remove('clicked');
    void el.charWrap.offsetWidth;
    el.charWrap.classList.add('clicked');
    addXp(state.clickPower, clientX, clientY);
  }

  el.charWrap.addEventListener('click', function(e){
    handleCharInteraction(e.clientX, e.clientY);
  });

  el.charWrap.addEventListener('touchstart', function(e){
    e.preventDefault();
    const touch = e.changedTouches[0];
    handleCharInteraction(touch.clientX, touch.clientY);
  }, { passive:false });

  /* ============ UPGRADES ============ */
  el.upgPower.addEventListener('click', function(){
    const cost = 2 + state.powerLvl * 2;
    if(state.skillPoints < cost) return;
    state.skillPoints -= cost;
    state.powerLvl += 1;
    state.clickPower += 1;
    render();
    save();
  });

  el.upgAuto.addEventListener('click', function(){
    const cost = 3 + state.autoLvl * 3;
    if(state.skillPoints < cost) return;
    state.skillPoints -= cost;
    state.autoLvl += 1;
    render();
    save();
  });

  el.upgSpeed.addEventListener('click', function(){
    const cost = 1 + state.speedLvl * 1;
    if(state.skillPoints < cost || xpNeeded(state.level) <= 20) return;
    state.skillPoints -= cost;
    state.speedLvl += 1;
    render();
    save();
  });

  /* ============ AUTO-CLICKER TICK ============ */
  setInterval(function(){
    if(state.autoLvl > 0){
      const rect = el.charWrap.getBoundingClientRect();
      addXp(state.autoLvl, rect.left + rect.width/2, rect.top + rect.height/2);
    }
  }, 1000);

  /* ============ BACKGROUND: SAND PARTICLES ============ */
  const MAX_SAND = 40;
  function spawnSandParticle(){
    if(el.sandContainer.children.length >= MAX_SAND) return;
    const p = document.createElement('div');
    p.className = 'sand-particle';
    p.style.left = Math.random()*100 + 'vw';
    const duration = 6 + Math.random()*8;
    p.style.animationDuration = duration + 's';
    p.style.opacity = (0.3 + Math.random()*0.5).toFixed(2);
    const size = (2 + Math.random()*3).toFixed(1) + 'px';
    p.style.width = size;
    p.style.height = size;
    el.sandContainer.appendChild(p);
    setTimeout(()=> p.remove(), duration*1000 + 200);
  }
  setInterval(spawnSandParticle, 350);
  for(let i=0;i<15;i++) setTimeout(spawnSandParticle, i*100);

  /* ============ BACKGROUND: DECORATIVE SYMBOLS ============ */
  const DECO_SYMBOLS = ['☥','𓆣','𓆼','☥','𓊵','𓆓'];
  function placeDecorations(){
    el.decoContainer.innerHTML = '';
    const count = window.innerWidth < 640 ? 5 : 9;
    for(let i=0;i<count;i++){
      const d = document.createElement('div');
      d.className = 'deco-symbol';
      d.textContent = DECO_SYMBOLS[i % DECO_SYMBOLS.length];
      d.style.left = (Math.random()*90 + 2) + 'vw';
      d.style.top = (Math.random()*80 + 5) + 'vh';
      d.style.transform = `rotate(${Math.random()*30-15}deg)`;
      el.decoContainer.appendChild(d);
    }
  }
  placeDecorations();
  window.addEventListener('resize', placeDecorations);

  /* ============ PAGE NAVIGATION ============ */
  const pages = {
    clicker: document.getElementById('page-clicker'),
    skills: document.getElementById('page-skills'),
    story: document.getElementById('page-story'),
    daily: document.getElementById('page-daily'),
    achievements: document.getElementById('page-achievements'),
  };
  const navButtons = document.querySelectorAll('.nav-btn');

  function switchPage(name){
    Object.keys(pages).forEach(function(key){
      pages[key].classList.toggle('active', key === name);
    });
    navButtons.forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.page === name);
    });
  }

  navButtons.forEach(function(btn){
    btn.addEventListener('click', function(){ switchPage(btn.dataset.page); });
  });

  /* ============ INIT ============ */
  load();
  render();
  updateAura();
  switchPage('clicker');
})();
</script>

</body>
</html>
